name: Scrape competencia (Goldcar) → bucket

# Captura diaria de precios públicos de Goldcar y subida al bucket privado.
# Requiere el secreto del repo: SUPABASE_SERVICE_KEY (service_role de Supabase).
on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC cada día (desfasado de CICAR 06:00 y Cabrera 06:15)
  workflow_dispatch: {}    # permite lanzarlo a mano desde la pestaña Actions

# No necesita escribir en el repo (los datos van al bucket, no a Pages).
permissions:
  contents: read

concurrency:
  group: scrape-goldcar
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Capturar precios de Goldcar
        working-directory: scraper
        run: node scrape-goldcar.mjs

      - name: Subir al bucket privado
        working-directory: scraper
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node upload-to-bucket.mjs goldcar-prices.json goldcar-prices.json
